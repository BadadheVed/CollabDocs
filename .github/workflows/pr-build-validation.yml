name: PR Build Validation

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [dev, main]

permissions:
  contents: read

jobs:
  build:
    name: Build (${{ matrix.service.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - name: backend
            path: backend
            build: npm run build
          - name: frontend
            path: frontend
            build: npm run build
          - name: websocket
            path: hocuspocus-server
            build: npm run build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json
            hocuspocus-server/package-lock.json

      - name: Install dependencies
        working-directory: ${{ matrix.service.path }}
        run: npm ci

      - name: Build
        working-directory: ${{ matrix.service.path }}
        run: ${{ matrix.service.build }}

  pr-comment:
    name: PR Build Comment
    needs: build
    runs-on: ubuntu-latest
    if: ${{ always() }}
    permissions:
      pull-requests: write
      contents: read
    steps:
      - name: Set comment body
        id: comment
        shell: bash
        run: |
          if [ "${{ needs.build.result }}" = "success" ]; then
            printf 'body=%s\n' "<!-- collabdocs-build-status --> ✅ All builds passed successfully. This branch is safe to deploy." >> "$GITHUB_OUTPUT"
          else
            printf 'body=%s\n' "<!-- collabdocs-build-status --> ⚠️ Build validation failed. This branch is NOT safe to deploy." >> "$GITHUB_OUTPUT"
          fi

      - name: Upsert PR comment
        uses: actions/github-script@v7
        env:
          BUILD_BODY: ${{ steps.comment.outputs.body }}
        with:
          script: |
            const marker = '<!-- collabdocs-build-status -->';
            const body = process.env.BUILD_BODY;
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;

            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find(
              (comment) =>
                comment.user?.login === 'github-actions[bot]' &&
                comment.body?.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }
