apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ .Release.Name }}-ws-hpa
  labels:
    {{- include "collabdocs.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ .Release.Name }}-ws
  minReplicas: {{ .Values.websocket.hpa.minReplicas }}
  maxReplicas: {{ .Values.websocket.hpa.maxReplicas }}
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: {{ .Values.websocket.hpa.targetCPUUtilizationPercentage }}
